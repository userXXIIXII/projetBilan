<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap" rel="stylesheet">
    <title>404 - Page non trouvée</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(#7f5af0, #16161a);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        h1 {
            font-size: 120px;
        }

        p {
            opacity: 0.8;
        }

        a {
            margin-top: 10px;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;

            background: white;
            color: #7f5af0;

            transition: 0.3s;
        }

        a:hover {
            transform: translateY(-3px);
            background: #e0e0ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Page non trouvée</p>
        <a href="/">Retour à l'accueil</a>
    </div>
</body>
</html>
